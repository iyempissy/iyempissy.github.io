locale: "en-US"
remote_theme: "academicpages/academicpages.github.io"
site_theme: "default"
title: "Olatunji Iyiola Emmanuel"
title_separator: "-"
name: &name "Olatunji Iyiola Emmanuel"
description: &description "Postdoctoral Researcher working on privacy, machine learning, and AI security."
url: "https://iyempissy.github.io"
baseurl: ""
repository: "iyempissy/iyempissy.github.io"

author:
  avatar: ""
  name: "Olatunji Iyiola Emmanuel"
  bio: "Postdoctoral Researcher at CISPA working on privacy of machine learning and large language models."
  location: "Saarbrucken, Germany"
  employer: "CISPA"
  uri: "https://iyempissy.github.io"
  email: "olatunji.emmanuel@cispa.de"
  googlescholar: "https://scholar.google.co.uk/citations?user=nPIxx4UAAAAJ&hl=en"
  github: "iyempissy"
  linkedin: "olatunjiiyem"

publication_category:
  manuscripts:
    title: "Journal Articles and Preprints"
  conferences:
    title: "Conference Papers"

breadcrumbs: false
words_per_minute: 180
future: true
read_more: "disabled"
talkmap_link: false
comments:
  provider:
atom_feed:
  hide: false

google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

twitter:
  username:
facebook:
  username:
  app_id:
  publisher:
og_image:
og_description:
social:
  type: Person
  name: "Olatunji Iyiola Emmanuel"
  links:
    - "https://github.com/iyempissy"
    - "https://hk.linkedin.com/in/olatunjiiyem"
    - "https://scholar.google.co.uk/citations?user=nPIxx4UAAAAJ&hl=en"

analytics:
  provider: false

include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Dockerfile
  - Gemfile.lock
  - Gruntfile.js
  - README.md
  - config
  - content
  - data
  - layouts
  - node_modules
  - public
  - resources
  - static
  - themes
  - tmp
  - vendor
  - go.mod
  - go.sum
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  publications:
    output: true
    permalink: /publication/:path/
  portfolio:
    output: true
    permalink: /portfolio/:path/
  talks:
    output: true
    permalink: /talks/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Europe/Luxembourg

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
  - jekyll-remote-theme

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
  - jekyll-remote-theme

compress_html:
  clippings: all
  ignore:
    envs: development
