<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description | strip_newlines | strip }}">
  <meta name="author" content="{{ site.data.data.profile.name }}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description | strip_newlines | strip }}">
  <meta property="og:url" content="{{ site.url }}">
  <meta property="og:image" content="{{ site.url }}/{{ site.data.data.profile.avatar }}">
  <meta name="twitter:card" content="summary">

  <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico?v=2">
  <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico?v=2">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz@0,6..72;1,6..72&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
</head>
