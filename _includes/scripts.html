<script>
  (function () {
    var nav = document.getElementById('navbar');
    var links = document.querySelectorAll('.navbar-links a');

    function navHeight() { return nav ? nav.offsetHeight : 0; }

    links.forEach(function (link) {
      link.addEventListener('click', function (e) {
        var id = link.getAttribute('href');
        if (id && id.charAt(0) === '#') {
          var target = document.querySelector(id);
          if (target) {
            e.preventDefault();
            var y = target.getBoundingClientRect().top + window.pageYOffset - navHeight() + 1;
            window.scrollTo({ top: y, behavior: 'smooth' });
            var navLinks = document.getElementById('nav-links');
            if (navLinks) navLinks.classList.remove('open');
            history.replaceState(null, '', id);
          }
        }
      });
    });

    var sections = ['about', 'news', 'research', 'students', 'publications']
      .map(function (id) { return document.getElementById(id); })
      .filter(Boolean);

    function onScroll() {
      var pos = window.pageYOffset + navHeight() + 20;
      var current = null;
      sections.forEach(function (sec) {
        if (sec.offsetTop <= pos) current = sec.id;
      });
      links.forEach(function (link) {
        link.classList.toggle('active', link.getAttribute('href') === '#' + current);
      });
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  })();
</script>
