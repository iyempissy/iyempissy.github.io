{% assign news = site.data.data.news %}
{% if news %}
<section class="section" id="news">
  <h2 class="section-title">News</h2>
  <ul class="news-list">
    {% for item in news %}
    <li class="news-item">
      <span class="news-date">{{ item.date }}</span>
      <span class="news-text">{{ item.text | markdownify | remove: '<p>' | remove: '</p>' }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
{% endif %}
