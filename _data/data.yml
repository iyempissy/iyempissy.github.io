bio: |
  I am a postdoctoral researcher in the [TruX research group at SnT, University of Luxembourg](https://www.uni.lu/snt-en/research-groups/trux/), advised by [Tegawendé Bissyandé](https://bissyande.github.io/) and [Jacques Klein](https://jacquesklein2302.github.io/).

  Previously, I worked with [Adam Dziedzic](https://adam-dziedzic.com/) and [Franziska Boenisch](https://franziska-boenisch.de/) at [CISPA](https://cispa.de/en). I received my Ph.D. in Computer Science from Leibniz University Hannover in 2024 under the supervision of [Wolfgang Nejdl](https://kbs.uni-hannover.de/~nejdl/) and [Megha Khosla](https://khosla.github.io/).

  My research focuses on **secure code generation**, **LLM-based software engineering and security**, **privacy-preserving machine learning**, and **graph learning**, with an emphasis on building trustworthy AI systems that behave reliably under realistic threats.

